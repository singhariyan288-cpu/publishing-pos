<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Publishing Co. — Point of Sale</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f5f4;
    --surface: #ffffff;
    --surface2: #f9f9f8;
    --border: #e0deda;
    --border-strong: #c8c5bf;
    --text: #1c1c1a;
    --text-muted: #888780;
    --accent: #185fa5;
    --accent-bg: #e6f1fb;
    --accent-border: #b5d4f4;
    --success-bg: #eaf3de;
    --success-text: #3b6d11;
    --warning-bg: #faeeda;
    --warning-text: #854f0b;
    --danger-text: #a32d2d;
    --radius: 8px;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; color: var(--text); background: var(--bg); min-height: 100vh; }

  header { background: var(--surface); border-bottom: 0.5px solid var(--border); padding: 14px 24px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10; }
  .logo { font-size: 16px; font-weight: 600; letter-spacing: -0.3px; }
  .logo span { color: var(--accent); }
  .header-meta { font-size: 12px; color: var(--text-muted); }

  .app { display: grid; grid-template-columns: 1fr 360px; gap: 0; height: calc(100vh - 53px); }
  .left { padding: 20px; overflow-y: auto; border-right: 0.5px solid var(--border); background: var(--bg); }
  .right { background: var(--surface); padding: 20px; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }

  .tabs { display: flex; gap: 0; margin-bottom: 16px; border-bottom: 0.5px solid var(--border); }
  .tab { padding: 8px 18px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; background: none; color: var(--text-muted); border-bottom: 2px solid transparent; margin-bottom: -0.5px; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab:hover:not(.active) { color: var(--text); }

  .search-box { width: 100%; padding: 9px 14px; border: 0.5px solid var(--border-strong); border-radius: var(--radius); background: var(--surface); color: var(--text); font-size: 13px; outline: none; margin-bottom: 14px; }
  .search-box:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-bg); }

  .catalog { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 10px; }
  .book-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 13px; cursor: pointer; transition: border-color .15s, box-shadow .15s; }
  .book-card:hover { border-color: var(--accent-border); box-shadow: 0 0 0 3px var(--accent-bg); }
  .book-title { font-size: 13px; font-weight: 500; margin-bottom: 3px; line-height: 1.4; }
  .book-author { font-size: 11px; color: var(--text-muted); margin-bottom: 10px; }
  .book-footer { display: flex; justify-content: space-between; align-items: center; }
  .book-price { font-size: 13px; font-weight: 600; color: var(--accent); }
  .book-genre { font-size: 10px; background: var(--success-bg); color: var(--success-text); padding: 2px 7px; border-radius: 20px; font-weight: 500; }

  .panel-label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 10px; }
  .cart-items { flex: 1; overflow-y: auto; }
  .cart-item { display: flex; align-items: center; gap: 8px; padding: 9px 0; border-bottom: 0.5px solid var(--border); }
  .cart-info { flex: 1; min-width: 0; }
  .cart-name { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cart-price { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
  .qty-ctrl { display: flex; align-items: center; gap: 5px; }
  .qty-btn { width: 24px; height: 24px; border-radius: 5px; border: 0.5px solid var(--border-strong); background: var(--surface2); color: var(--text); font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .qty-btn:hover { background: var(--bg); }
  .qty-num { font-size: 13px; font-weight: 500; min-width: 20px; text-align: center; }
  .item-total { font-size: 12px; font-weight: 500; min-width: 56px; text-align: right; }
  .rm-btn { width: 22px; height: 22px; border: none; background: none; color: var(--text-muted); cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; border-radius: 4px; }
  .rm-btn:hover { background: #fee2e2; color: var(--danger-text); }

  .totals-box { background: var(--surface2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 12px; }
  .total-row { display: flex; justify-content: space-between; font-size: 13px; padding: 3px 0; color: var(--text-muted); }
  .total-row.grand { font-size: 15px; font-weight: 600; color: var(--text); border-top: 0.5px solid var(--border); margin-top: 6px; padding-top: 8px; }

  .field-group { display: flex; flex-direction: column; gap: 5px; }
  .field-label { font-size: 11px; color: var(--text-muted); font-weight: 500; }
  input[type=text], input[type=email], select {
    width: 100%; padding: 8px 10px; border: 0.5px solid var(--border-strong); border-radius: var(--radius);
    background: var(--surface); color: var(--text); font-size: 13px; outline: none; font-family: inherit;
  }
  input:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-bg); }
  .disc-row { display: flex; gap: 8px; }
  .disc-row input { width: 90px; }
  .disc-row select { flex: 1; }

  .btn-primary { width: 100%; padding: 11px; background: var(--accent); color: white; border: none; border-radius: var(--radius); font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity .15s; }
  .btn-primary:hover { opacity: .88; }
  .btn-primary:disabled { opacity: .4; cursor: not-allowed; }
  .btn-ghost { width: 100%; padding: 9px; background: none; border: 0.5px solid var(--border-strong); border-radius: var(--radius); font-size: 13px; cursor: pointer; color: var(--text-muted); font-family: inherit; }
  .btn-ghost:hover { background: var(--bg); }

  /* History */
  .stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 16px; }
  .stat-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 10px 12px; }
  .stat-label { font-size: 10px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 4px; }
  .stat-val { font-size: 15px; font-weight: 600; }
  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .chip { padding: 5px 12px; border-radius: 20px; border: 0.5px solid var(--border-strong); background: var(--surface); font-size: 12px; cursor: pointer; color: var(--text-muted); }
  .chip.active { background: var(--accent-bg); border-color: var(--accent-border); color: var(--accent); font-weight: 500; }
  .inv-row { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 12px; margin-bottom: 8px; cursor: pointer; transition: border-color .15s; }
  .inv-row:hover { border-color: var(--border-strong); }
  .inv-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
  .inv-id { font-size: 13px; font-weight: 600; }
  .inv-cust { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
  .inv-amt { font-size: 14px; font-weight: 600; color: var(--accent); }
  .inv-meta { display: flex; gap: 14px; font-size: 11px; color: var(--text-muted); margin-top: 6px; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }
  .badge-paid { background: var(--success-bg); color: var(--success-text); }
  .badge-pending { background: var(--warning-bg); color: var(--warning-text); }

  /* Modal */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 50; align-items: center; justify-content: center; }
  .overlay.open { display: flex; }
  .modal { background: var(--surface); border: 0.5px solid var(--border); border-radius: 12px; padding: 24px; width: 460px; max-height: 85vh; overflow-y: auto; }
  .modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .modal-title { font-size: 16px; font-weight: 600; }
  .modal-actions { display: flex; gap: 8px; }
  .btn-sm { padding: 6px 14px; border: 0.5px solid var(--border-strong); border-radius: var(--radius); background: none; font-size: 13px; cursor: pointer; font-family: inherit; color: var(--text-muted); }
  .btn-sm:hover { background: var(--bg); }
  .inv-doc { font-family: 'Courier New', monospace; font-size: 12px; background: var(--surface2); border-radius: 8px; padding: 20px; line-height: 1.9; border: 0.5px solid var(--border); }
  .inv-line { display: flex; justify-content: space-between; }
  .inv-divider { border: none; border-top: 1px dashed var(--border-strong); margin: 8px 0; }

  .empty { text-align: center; padding: 40px 20px; color: var(--text-muted); }
  .empty-icon { font-size: 36px; margin-bottom: 10px; }

  @media print {
    body * { visibility: hidden; }
    .inv-doc, .inv-doc * { visibility: visible; }
    .inv-doc { position: fixed; top: 20px; left: 20px; right: 20px; font-size: 13px; }
  }
  @media (max-width: 700px) {
    .app { grid-template-columns: 1fr; grid-template-rows: auto auto; height: auto; }
    .left { border-right: none; border-bottom: 0.5px solid var(--border); }
    .stats-grid { grid-template-columns: repeat(2,1fr); }
    .catalog { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
    .modal { width: 95vw; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">📚 <span>Publish</span>Co. POS</div>
  <div class="header-meta" id="clock"></div>
</header>

<div class="app">
  <!-- LEFT -->
  <div class="left">
    <div class="tabs">
      <button class="tab active" id="tab-catalog" onclick="switchTab('catalog')">🛒 Catalog</button>
      <button class="tab" id="tab-history" onclick="switchTab('history')">📋 Sales History</button>
    </div>

    <!-- CATALOG -->
    <div id="view-catalog">
      <input class="search-box" placeholder="Search books by title, author, genre…" oninput="filterBooks(this.value)" />
      <div class="catalog" id="catalog-grid"></div>
    </div>

    <!-- HISTORY -->
    <div id="view-history" style="display:none">
      <div class="stats-grid" id="stats-grid"></div>
      <div class="filter-row">
        <span class="chip active" onclick="setFilter('all',this)">All</span>
        <span class="chip" onclick="setFilter('paid',this)">Paid</span>
        <span class="chip" onclick="setFilter('pending',this)">Pending</span>
        <span class="chip" onclick="setFilter('today',this)">Today</span>
        <span class="chip" onclick="setFilter('week',this)">This week</span>
      </div>
      <input class="search-box" placeholder="Search by invoice # or customer name…" oninput="searchSales(this.value)" />
      <div id="history-list"></div>
    </div>
  </div>

  <!-- RIGHT (cart) -->
  <div class="right">
    <div class="panel-label">Current invoice</div>
    <div class="cart-items" id="cart-items">
      <div class="empty" id="cart-empty"><div class="empty-icon">🛒</div><div>Tap a book to add it</div></div>
    </div>

    <div class="totals-box" id="totals-box" style="display:none">
      <div class="total-row"><span>Subtotal</span><span id="v-sub">₹0</span></div>
      <div class="total-row"><span>Discount</span><span id="v-disc">−₹0</span></div>
      <div class="total-row"><span>GST 18%</span><span id="v-tax">₹0</span></div>
      <div class="total-row grand"><span>Total</span><span id="v-grand">₹0</span></div>
    </div>

    <div class="field-group">
      <span class="field-label">Customer name</span>
      <input type="text" id="cust-name" placeholder="Walk-in customer" />
    </div>
    <div class="field-group">
      <span class="field-label">Phone / email</span>
      <input type="text" id="cust-contact" placeholder="+91 98000 00000" />
    </div>
    <div class="field-group">
      <span class="field-label">Discount</span>
      <div class="disc-row">
        <input type="text" id="disc-val" placeholder="0" oninput="updateTotals()" />
        <select id="disc-type" onchange="updateTotals()">
          <option value="flat">₹ flat</option>
          <option value="pct">% off</option>
        </select>
      </div>
    </div>
    <div class="field-group">
      <span class="field-label">Payment method</span>
      <select id="payment">
        <option>Cash</option>
        <option>UPI</option>
        <option>Card</option>
        <option>Bank Transfer</option>
        <option>COD</option>
      </select>
    </div>
    <div class="field-group">
      <span class="field-label">Status</span>
      <select id="inv-status">
        <option value="paid">Paid</option>
        <option value="pending">Pending</option>
      </select>
    </div>
    <button class="btn-primary" id="checkout-btn" onclick="checkout()" disabled>🖨 Generate invoice</button>
    <button class="btn-ghost" onclick="clearCart()">Clear cart</button>
  </div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="closeOverlay(event)">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title">Invoice</span>
      <div class="modal-actions">
        <button class="btn-sm" onclick="window.print()">🖨 Print</button>
        <button class="btn-sm" onclick="document.getElementById('overlay').classList.remove('open')">✕ Close</button>
      </div>
    </div>
    <div id="inv-content"></div>
  </div>
</div>

<script>
const BOOKS = [
  { id:'B001', title:'Wings of Fire', author:'Rabindranath Roy', genre:'Biography', price:299 },
  { id:'B002', title:'The Hidden Truth', author:'Priya Sharma', genre:'Fiction', price:399 },
  { id:'B003', title:'Data Structures', author:'Arjun Mehta', genre:'Academic', price:599 },
  { id:'B004', title:'Python Mastery', author:'Sneha Paul', genre:'Academic', price:449 },
  { id:'B005', title:'Midnight Rain', author:'Raju Sen', genre:'Fiction', price:349 },
  { id:'B006', title:'History of India', author:'Amit Das', genre:'History', price:499 },
  { id:'B007', title:'Child Mind', author:'Priya Sharma', genre:'Children', price:199 },
  { id:'B008', title:'Business Growth', author:'Arjun Mehta', genre:'Self-Help', price:329 },
  { id:'B009', title:'The Last Kingdom', author:'Raju Sen', genre:'Fantasy', price:379 },
  { id:'B010', title:'Science Today', author:'Amit Das', genre:'Science', price:549 },
  { id:'B011', title:'Love in Mumbai', author:'Sneha Paul', genre:'Romance', price:299 },
  { id:'B012', title:'The Cold Case', author:'Rabindranath Roy', genre:'Mystery', price:419 },
];

let cart = [];
let sales = JSON.parse(localStorage.getItem('pos_sales') || '[]');
let histFilter = 'all';
let histSearch = '';

function saveSales() { localStorage.setItem('pos_sales', JSON.stringify(sales)); }
function fmt(n) { return '₹' + Math.round(n).toLocaleString('en-IN'); }

// Clock
setInterval(() => {
  document.getElementById('clock').textContent = new Date().toLocaleString('en-IN',{weekday:'short',day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
}, 1000);

// Catalog
function renderCatalog(list) {
  const g = document.getElementById('catalog-grid');
  if (!list.length) { g.innerHTML = '<div class="empty">No books found.</div>'; return; }
  g.innerHTML = list.map(b => `
    <div class="book-card" onclick="addToCart('${b.id}')">
      <div class="book-title">${b.title}</div>
      <div class="book-author">${b.author}</div>
      <div class="book-footer">
        <span class="book-price">${fmt(b.price)}</span>
        <span class="book-genre">${b.genre}</span>
      </div>
    </div>
  `).join('');
}

function filterBooks(q) {
  const f = q.toLowerCase();
  renderCatalog(BOOKS.filter(b => b.title.toLowerCase().includes(f) || b.author.toLowerCase().includes(f) || b.genre.toLowerCase().includes(f)));
}

// Cart
function addToCart(id) {
  const b = BOOKS.find(x => x.id === id);
  const ex = cart.find(x => x.id === id);
  if (ex) ex.qty++; else cart.push({...b, qty:1});
  renderCart();
}

function renderCart() {
  const el = document.getElementById('cart-items');
  const empty = document.getElementById('cart-empty');
  const totals = document.getElementById('totals-box');
  const btn = document.getElementById('checkout-btn');

  if (!cart.length) {
    if (empty) empty.style.display = ''; else el.innerHTML = '<div class="empty" id="cart-empty"><div class="empty-icon">🛒</div><div>Tap a book to add it</div></div>';
    totals.style.display = 'none'; btn.disabled = true; return;
  }
  totals.style.display = ''; btn.disabled = false;
  el.innerHTML = cart.map((c,i) => `
    <div class="cart-item">
      <div class="cart-info">
        <div class="cart-name">${c.title}</div>
        <div class="cart-price">${fmt(c.price)} each</div>
      </div>
      <div class="qty-ctrl">
        <button class="qty-btn" onclick="chQty(${i},-1)">−</button>
        <span class="qty-num">${c.qty}</span>
        <button class="qty-btn" onclick="chQty(${i},1)">+</button>
      </div>
      <span class="item-total">${fmt(c.price*c.qty)}</span>
      <button class="rm-btn" onclick="rmItem(${i})" title="Remove">✕</button>
    </div>
  `).join('');
  updateTotals();
}

function chQty(i,d) { cart[i].qty += d; if(cart[i].qty<=0) cart.splice(i,1); renderCart(); }
function rmItem(i) { cart.splice(i,1); renderCart(); }
function clearCart() { cart=[]; renderCart(); }

function getDiscount(sub) {
  const v = parseFloat(document.getElementById('disc-val').value)||0;
  const t = document.getElementById('disc-type').value;
  return t==='pct' ? Math.min(sub, sub*v/100) : Math.min(sub,v);
}

function updateTotals() {
  const sub = cart.reduce((s,c)=>s+c.price*c.qty,0);
  const disc = getDiscount(sub);
  const tax = (sub-disc)*0.18;
  const grand = sub-disc+tax;
  document.getElementById('v-sub').textContent = fmt(sub);
  document.getElementById('v-disc').textContent = '−'+fmt(disc);
  document.getElementById('v-tax').textContent = fmt(tax);
  document.getElementById('v-grand').textContent = fmt(grand);
}

function checkout() {
  if (!cart.length) return;
  const sub = cart.reduce((s,c)=>s+c.price*c.qty,0);
  const disc = getDiscount(sub);
  const tax = (sub-disc)*0.18;
  const grand = sub-disc+tax;
  const now = new Date();
  const id = 'INV-'+now.getFullYear()+String(now.getMonth()+1).padStart(2,'0')+String(now.getDate()).padStart(2,'0')+'-'+String(sales.length+1).padStart(3,'0');

  const inv = {
    id, date: now.toISOString(),
    customer: document.getElementById('cust-name').value || 'Walk-in customer',
    contact: document.getElementById('cust-contact').value,
    payment: document.getElementById('payment').value,
    status: document.getElementById('inv-status').value,
    items: cart.map(c=>({...c})),
    sub, disc, tax, grand
  };
  sales.unshift(inv);
  saveSales();
  showModal(inv);
  cart = [];
  document.getElementById('cust-name').value='';
  document.getElementById('cust-contact').value='';
  document.getElementById('disc-val').value='';
  renderCart();
  renderHistory();
}

function showModal(inv) {
  const rows = inv.items.map(i=>`<div class="inv-line"><span>${i.title} x${i.qty}</span><span>${fmt(i.price*i.qty)}</span></div>`).join('');
  const d = new Date(inv.date);
  const dateStr = d.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
  const timeStr = d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});

  document.getElementById('inv-content').innerHTML = `
    <div class="inv-doc">
      <div class="inv-line"><b>PUBLISH CO. BOOK STORE</b></div>
      <div style="color:#888;font-size:11px;margin-bottom:4px">Tax Invoice</div>
      <div class="inv-line" style="font-size:11px;color:#888"><span>Invoice No: ${inv.id}</span><span>${dateStr} ${timeStr}</span></div>
      <hr class="inv-divider"/>
      <div class="inv-line"><span>Customer:</span><span>${inv.customer}</span></div>
      ${inv.contact?`<div class="inv-line"><span>Contact:</span><span>${inv.contact}</span></div>`:''}
      <div class="inv-line"><span>Payment:</span><span>${inv.payment}</span></div>
      <hr class="inv-divider"/>
      <b>Items</b>
      <div style="margin-top:4px">${rows}</div>
      <hr class="inv-divider"/>
      <div class="inv-line"><span>Subtotal</span><span>${fmt(inv.sub)}</span></div>
      ${inv.disc>0?`<div class="inv-line"><span>Discount</span><span>−${fmt(inv.disc)}</span></div>`:''}
      <div class="inv-line"><span>GST @ 18%</span><span>${fmt(inv.tax)}</span></div>
      <hr class="inv-divider"/>
      <div class="inv-line"><b>GRAND TOTAL</b><b>${fmt(inv.grand)}</b></div>
      <div style="margin-top:14px;text-align:center">
        <span style="background:${inv.status==='paid'?'#eaf3de':'#faeeda'};color:${inv.status==='paid'?'#3b6d11':'#854f0b'};padding:3px 14px;border-radius:20px;font-size:11px;font-weight:600">${inv.status.toUpperCase()}</span>
        <div style="margin-top:10px;color:#888;font-size:11px">Thank you for your purchase! 🙏</div>
      </div>
    </div>
  `;
  document.getElementById('overlay').classList.add('open');
}

function closeOverlay(e) { if(e.target===document.getElementById('overlay')) document.getElementById('overlay').classList.remove('open'); }

// History
function renderHistory() {
  const total = sales.reduce((s,i)=>s+i.grand,0);
  const paid = sales.filter(i=>i.status==='paid');
  const avg = sales.length ? total/sales.length : 0;

  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card"><div class="stat-label">Invoices</div><div class="stat-val">${sales.length}</div></div>
    <div class="stat-card"><div class="stat-label">Revenue</div><div class="stat-val" style="font-size:13px">${fmt(total)}</div></div>
    <div class="stat-card"><div class="stat-label">Collected</div><div class="stat-val" style="font-size:13px">${fmt(paid.reduce((s,i)=>s+i.grand,0))}</div></div>
    <div class="stat-card"><div class="stat-label">Avg order</div><div class="stat-val" style="font-size:13px">${fmt(avg)}</div></div>
  `;

  let list = [...sales];
  const today = new Date(); today.setHours(0,0,0,0);
  const week = new Date(today); week.setDate(week.getDate()-7);
  if (histFilter==='paid') list=list.filter(i=>i.status==='paid');
  else if (histFilter==='pending') list=list.filter(i=>i.status==='pending');
  else if (histFilter==='today') list=list.filter(i=>new Date(i.date)>=today);
  else if (histFilter==='week') list=list.filter(i=>new Date(i.date)>=week);
  if (histSearch) { const q=histSearch.toLowerCase(); list=list.filter(i=>i.id.toLowerCase().includes(q)||i.customer.toLowerCase().includes(q)); }

  const el = document.getElementById('history-list');
  if (!list.length) { el.innerHTML='<div class="empty"><div class="empty-icon">📋</div><div>No invoices found.</div></div>'; return; }

  el.innerHTML = list.map(inv=>`
    <div class="inv-row" onclick="showModal(${JSON.stringify(inv).replace(/"/g,'&quot;')})">
      <div class="inv-top">
        <div><div class="inv-id">${inv.id}</div><div class="inv-cust">${inv.customer}</div></div>
        <div style="text-align:right">
          <div class="inv-amt">${fmt(inv.grand)}</div>
          <span class="badge ${inv.status==='paid'?'badge-paid':'badge-pending'}" style="margin-top:4px;display:inline-block">${inv.status}</span>
        </div>
      </div>
      <div class="inv-meta">
        <span>📅 ${new Date(inv.date).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})}</span>
        <span>💳 ${inv.payment}</span>
        <span>📚 ${inv.items.length} item${inv.items.length>1?'s':''}</span>
      </div>
    </div>
  `).join('');
}

function setFilter(f, el) {
  histFilter = f;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  renderHistory();
}

function searchSales(q) { histSearch=q; renderHistory(); }

function switchTab(t) {
  document.getElementById('view-catalog').style.display = t==='catalog'?'':'none';
  document.getElementById('view-history').style.display = t==='history'?'':'none';
  document.getElementById('tab-catalog').classList.toggle('active', t==='catalog');
  document.getElementById('tab-history').classList.toggle('active', t==='history');
  if (t==='history') renderHistory();
}

// Init
renderCatalog(BOOKS);
renderCart();
</script>
</body>
</html>
